name: Discover and publish TRAE Work

on:
  workflow_dispatch:
    inputs:
      dmg_url:
        description: 'TRAE Work macOS x64 DMG URL'
        required: false
        type: string
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full dmg2img jq python3 perl curl
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Resolve official TRAE Work DMG
        id: upstream
        env:
          # Manual runs may provide an exact DMG. Scheduled runs leave this
          # empty and let the resolver discover the current official URL.
          TRAE_DMG_URL: ${{ inputs.dmg_url || vars.TRAE_DMG_URL }}
          TRAE_DOWNLOAD_PAGE: ${{ vars.TRAE_DOWNLOAD_PAGE }}
        run: |
          url="$(bash packaging/resolve-version.sh)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Build packages
        env:
          DMG_URL: ${{ steps.upstream.outputs.url }}
        run: ./packaging/build.sh

      - name: Read upstream version
        id: version
        run: |
          # This is extracted from the DMG's Info.plist by install.sh. Do not
          # use the CDN path or the donor Electron/payload version for tags.
          version="$(jq -r '.upstream_version' build/payload/build-info.json)"
          test -n "$version" && test "$version" != null
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish release if new
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to publish."
            exit 0
          fi
          gh release create "$TAG" \
            dist/trae-solo_*.deb dist/trae-solo-*.rpm \
            --title "TRAE Work $TAG (Linux)" \
            --generate-notes
